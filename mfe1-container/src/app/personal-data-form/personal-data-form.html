<div class="mfe1-personal-data-form-wrapper">
  <h2>Personal Data Form</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName" placeholder="First Name">
        <mat-error *ngIf="form.get('firstName')?.hasError('required')">First name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName" placeholder="Last Name">
        <mat-error *ngIf="form.get('lastName')?.hasError('required')">Last name is required</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email Address</mat-label>
      <input matInput formControlName="email" placeholder="example@domain.com" type="email">
      <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
      <mat-error *ngIf="form.get('email')?.hasError('email')">Please enter a valid email</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phone Number</mat-label>
      <input matInput formControlName="phoneNumber" placeholder="Phone Number">
      <mat-error *ngIf="form.get('phoneNumber')?.hasError('required')">Phone number is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address</mat-label>
      <textarea matInput formControlName="address" placeholder="Physical Address" rows="3"></textarea>
      <mat-error *ngIf="form.get('address')?.hasError('required')">Address is required</mat-error>
    </mat-form-field>

    <div class="form-actions">
      <button *ngIf="actions.includes('cancel')" mat-button type="button" (click)="onCancel()">Cancel</button>
      <button *ngIf="actions.includes('submit')" mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Submit</button>
    </div>
  </form>
</div>
