---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakClient
metadata:
  name: shell-ui
spec:
  realmRef:
    name: dev
    kind: KeycloakRealm
  advancedProtocolMappers: true
  clientId: shell-ui
  name: shell UI Oauth Client
  description: Shell UI OAuth Client
  public: true
  standardFlowEnabled: true
  directAccess: true
  implicitFlowEnabled: true
  optionalClientScopes:
    - client-audience
  redirectUris:
    - "*"
  webOrigins:
    - "*"
