metadata:
  name: mfe1
spec:
  releaseName: mfe1
  chartRef:
    kind: OCIRepository
    name: mfe-shell
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/polecatworks/mfe-shell-mfe1
      tag: sha-a6cc8365da02098c0a6c2ab4731d0d9ad51494a4
      pullPolicy: Always # Dev ONLY
    env:
      - name: SERVE_ROOT
        value: /mfe/mfe1
