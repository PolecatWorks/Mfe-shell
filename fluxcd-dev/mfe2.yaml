---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mfe2
spec:
  releaseName: mfe2
  chartRef:
    kind: OCIRepository
    name: mfe-shell
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/polecatworks/mfe-shell-mfe2
      tag: sha-45e887836c8f4a706f9a63fb8ecb935fd0cc64ec
      pullPolicy: Always # Dev ONLY
    env:
      - name: SERVE_ROOT
        value: /mfe/mfe2
