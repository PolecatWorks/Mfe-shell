<div class="shell-layout">
  <!-- Navigation Rail -->
  <aside class="nav-rail">
    <div class="rail-header">
      <div class="app-logo">
        <mat-icon>polymer</mat-icon>
      </div>
    </div>

    <div class="rail-content">
      <nav class="nav-links">
        <a *ngFor="let item of menuItems" 
           [routerLink]="item.route" 
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: item.route === '/home'}"
           class="nav-item" 
           [matTooltip]="item.name" 
           matTooltipPosition="right">
          <mat-icon>{{ item.icon || 'radio_button_unchecked' }}</mat-icon>
          <span class="nav-label">{{ item.name }}</span>
        </a>
      </nav>
    </div>

    <div class="rail-footer">
      <div class="divider"></div>
      <a mat-icon-button routerLink="/home" matTooltip="Home" matTooltipPosition="right">
        <mat-icon>home</mat-icon>
      </a>
      <button mat-icon-button matTooltip="Reset Shell" matTooltipPosition="right" (click)="reload()">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Favorites" matTooltipPosition="right">
        <mat-icon>favorite_border</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Share" matTooltipPosition="right">
        <mat-icon>share</mat-icon>
      </button>
    </div>
  </aside>

  <!-- Main Viewport Area -->
  <section class="main-viewport">
    <main class="content-wrapper" [@routeAnimations]="getRouteAnimationData(outlet)">
      <div class="content">
        <router-outlet #outlet="outlet" />

        @if (!outlet.isActivated) {
        <div class="dashboard-container">
          <div class="square-card card-1">
            <mat-icon>dashboard</mat-icon>
            <span class="title">Dashboard</span>
          </div>
          <div class="square-card card-2">
            <mat-icon>analytics</mat-icon>
            <span class="title">Analytics</span>
          </div>
          <div class="square-card card-3">
            <mat-icon>settings</mat-icon>
            <span class="title">Settings</span>
          </div>
          <div class="square-card card-4" [routerLink]="['/home/angry-agent/chat']" matTooltip="AI Chat">
            <mat-icon>smart_toy</mat-icon>
            <span class="title">AI Chat</span>
          </div>
        </div>
        }
      </div>
    </main>
  </section>
</div>
