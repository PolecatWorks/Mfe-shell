<mat-toolbar color="primary">
  <button mat-icon-button [matMenuTriggerFor]="navMenu" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #navMenu="matMenu">
    <a mat-menu-item *ngFor="let item of menuItems" [routerLink]="item.route">{{ item.name }}</a>
  </mat-menu>

  <span>Shell</span>
  <span class="example-spacer"></span>
  <a mat-icon-button routerLink="/home" aria-label="Home" matTooltip="Home">
    <mat-icon>home</mat-icon>
  </a>
  <a mat-icon-button href="#" aria-label="Reset" matTooltip="Reset">
    <mat-icon>refresh</mat-icon>
  </a>
  <button mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon">
    <mat-icon>favorite</mat-icon>
  </button>
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with share icon">
    <mat-icon>share</mat-icon>
  </button>
</mat-toolbar>

<main class="content-wrapper" [@routeAnimations]="getRouteAnimationData(outlet)">
  <div class="content">
    <router-outlet #outlet="outlet" />

    @if (!outlet.isActivated) {
    <div class="dashboard-container">
      <div class="square-card card-1">
        <mat-icon>dashboard</mat-icon>
        <span class="title">Dashboard</span>
      </div>
      <div class="square-card card-2">
        <mat-icon>analytics</mat-icon>
        <span class="title">Analytics</span>
      </div>
      <div class="square-card card-3">
        <mat-icon>settings</mat-icon>
        <span class="title">Settings</span>
      </div>
      <div class="square-card card-4" [routerLink]="['/home/angry-agent/chat']" matTooltip="AI Chat">
        <mat-icon>smart_toy</mat-icon>
        <span class="title">AI Chat</span>
      </div>
    </div>
    }
  </div>
</main>
