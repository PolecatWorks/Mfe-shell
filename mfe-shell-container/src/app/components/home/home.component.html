<mat-toolbar color="primary">
  <button mat-icon-button [matMenuTriggerFor]="navMenu" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #navMenu="matMenu">
    <a mat-menu-item *ngFor="let item of menuItems" [routerLink]="item.route">{{ item.name }}</a>
  </mat-menu>

  <span>Shell</span>
  <span class="example-spacer"></span>
  <a mat-icon-button href="#" aria-label="Reset" matTooltip="Reset">
    <mat-icon>refresh</mat-icon>
  </a>
  <button mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon">
    <mat-icon>favorite</mat-icon>
  </button>
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with share icon">
    <mat-icon>share</mat-icon>
  </button>
</mat-toolbar>

<!-- Add Content Here -->
<div class="content">
  <router-outlet />
</div>
